<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2Chat</title>

  <script type="module">
    let lastMessageTime = 0;
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup,
      RecaptchaVerifier, signInWithPhoneNumber,
      createUserWithEmailAndPassword, signInWithEmailAndPassword,
      onAuthStateChanged, signOut, updateProfile,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      runTransaction,getFirestore, doc, setDoc, getDoc, collection, query, where,
      getDocs, addDoc, updateDoc, arrayUnion, onSnapshot,
      serverTimestamp, orderBy, limit, getDoc as getDocument,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {
      getStorage, ref, uploadBytes, getDownloadURL,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    // =============================================
    // 🔥 여기에 Firebase 설정값을 붙여넣으세요!
    // =============================================
    const firebaseConfig = {
  apiKey: "AIzaSyD__xGslUT-msvbZHBVf2xNcdE-OtTBH70",
  authDomain: "test-9ae6a.firebaseapp.com",
  projectId: "test-9ae6a",
  storageBucket: "test-9ae6a.firebasestorage.app",
  messagingSenderId: "337638583878",
  appId: "1:337638583878:web:b420205f4def59c9152447",
  measurementId: "G-6G4RNWXE8K"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // ── 전역 상태 ──────────────────────────────
    let currentUser = null;
    let currentChatId = null;
    let currentChatIsGroup = false;
    let unsubscribeChat = null;
    let unsubscribeChatList = null;

    // ── 화면 전환 ──────────────────────────────
    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    // ── reCAPTCHA ──────────────────────────────
    function setupRecaptcha() {
      if (!window.recaptchaVerifier) {
        window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", { size: "invisible" });
      }
    }

    // ══════════════════════════════════════════
    // AUTH — 로그인 탭 전환
    // ══════════════════════════════════════════
    window.switchLoginTab = (tab) => {
      document.querySelectorAll(".login-tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".login-tab-panel").forEach(p => p.classList.remove("active"));
      document.querySelector(`.login-tab-btn[data-tab="${tab}"]`).classList.add("active");
      document.getElementById(`login-tab-${tab}`).classList.add("active");
    };

    // ══════════════════════════════════════════
    // AUTH — 이메일 회원가입
    // ══════════════════════════════════════════
    window.emailSignup = async () => {
      const name  = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const pw    = document.getElementById("signup-pw").value;
      const pw2   = document.getElementById("signup-pw2").value;
      if (!name || !email || !pw) return showToast("모든 항목을 입력해주세요.");
      if (pw !== pw2) return showToast("비밀번호가 일치하지 않습니다.");
      try {
        showLoading(true);
        const result = await createUserWithEmailAndPassword(auth, email, pw);
        await updateProfile(result.user, { displayName: name });
        await saveUserToFirestore(result.user, name);
        // ✅ 직접 화면 전환
        currentUser = result.user;
        await loadUserProfile();
        showScreen("main-screen");
        loadFriendsList();
        listenChatList();
      } catch (e) {
        showToast("회원가입 실패: " + e.message);
      } finally { showLoading(false); }
    };

    // ══════════════════════════════════════════
    // AUTH — 이메일 로그인
    // ══════════════════════════════════════════
    window.emailLogin = async () => {
      const email = document.getElementById("login-email").value.trim();
      const pw    = document.getElementById("login-pw").value;
      if (!email || !pw) return showToast("이메일과 비밀번호를 입력해주세요.");
      try {
        showLoading(true);
        await signInWithEmailAndPassword(auth, email, pw);
      } catch (e) {
        showToast("로그인 실패: " + e.message);
      } finally { showLoading(false); }
    };

    // ══════════════════════════════════════════
    // AUTH — 구글 로그인
    // ══════════════════════════════════════════
    window.loginWithGoogle = async () => {
      try {
        showLoading(true);
        const result = await signInWithPopup(auth, new GoogleAuthProvider());
        await saveUserToFirestore(result.user);
        // ✅ 직접 화면 전환
        currentUser = result.user;
        await loadUserProfile();
        showScreen("main-screen");
        loadFriendsList();
        listenChatList();
      } catch (e) {
        showToast("구글 로그인 실패: " + e.message);
      } finally { showLoading(false); }
    };

    // ══════════════════════════════════════════
    // AUTH — 전화번호 로그인
    // ══════════════════════════════════════════
    window.sendSmsCode = async () => {
      const phone = document.getElementById("phone-input").value.trim();
      if (!phone) return showToast("전화번호를 입력해주세요.");
      setupRecaptcha();
      try {
        showLoading(true);
        window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
        document.getElementById("phone-step1").classList.add("hidden");
        document.getElementById("phone-step2").classList.remove("hidden");
      } catch (e) { showToast("SMS 발송 실패: " + e.message); }
      finally { showLoading(false); }
    };

    window.verifySmsCode = async () => {
      const code = document.getElementById("sms-code-input").value.trim();
      if (!code) return showToast("인증코드를 입력해주세요.");
      try {
        showLoading(true);
        const result = await window.confirmationResult.confirm(code);
        await saveUserToFirestore(result.user);
      } catch (e) { showToast("인증 실패: " + e.message); }
      finally { showLoading(false); }
    };

    // ── Firestore 유저 저장 ───────────────────
    async function saveUserToFirestore(user, forceName) {
      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) {
       const displayName =
forceName ||
user.displayName ||
user.phoneNumber ||
`User_${user.uid.slice(0,6)}`;
        const username = user.email
          ? user.email.split("@")[0]
          : (user.phoneNumber?.replace(/\D/g, "") ?? user.uid.slice(0, 8));
        await setDoc(userRef, {
          uid: user.uid, displayName,
          photoURL: user.photoURL || "",
          email: user.email || "",
          phoneNumber: user.phoneNumber || "",
          username, friends: [], createdAt: serverTimestamp(),
        });
      }
    }

    // ══════════════════════════════════════════
    // AUTH — 상태 감지
    // ══════════════════════════════════════════
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        await loadUserProfile();
        showScreen("main-screen");
        loadFriendsList();
        listenChatList();
      } else {
        currentUser = null;
        if (unsubscribeChatList) { unsubscribeChatList(); unsubscribeChatList = null; }
        showScreen("login-screen");
      }
    });

    window.logout = async () => { await signOut(auth); };

    // ══════════════════════════════════════════
    // PROFILE
    // ══════════════════════════════════════════
    async function loadUserProfile() {
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      if (!snap.exists()) return;
      const d = snap.data();
      document.getElementById("header-name").textContent = d.displayName;
      document.getElementById("header-photo").src =
        d.photoURL || `https://api.dicebear.com/7.x/thumbs/svg?seed=${currentUser.uid}`;
      document.getElementById("profile-preview").src =
        d.photoURL || `https://api.dicebear.com/7.x/thumbs/svg?seed=${currentUser.uid}`;
      
    }

    window.saveProfile = async () => {
        const username = document
  .getElementById("profile-username-input")
  .value.trim().toLowerCase();
  if(!/^[a-z0-9_]{4,20}$/.test(username)){
  showToast(
    "아이디는 영문, 숫자, _ 만 사용 가능합니다."
  );
  return;
}

// 중복 검사
const q = query(
  collection(db, "users"),
  where("username", "==", username)
);

const snap = await getDocs(q);

if (!snap.empty) {
  const duplicated = snap.docs.some(
    d => d.id !== currentUser.uid
  );

  if (duplicated) {
    showToast("이미 사용 중인 아이디입니다.");
    return;
  }
}

  try {

    showLoading(true);

    const newName =
      document.getElementById("profile-name-input")
      .value
      .trim();
    const newUsername =
    document.getElementById(
      "profile-username-input"
    ).value.trim().toLowerCase();

    const fileInput =
      document.getElementById("profile-photo-input");
    const file = fileInput.files[0];

if(file){
  if(!file.type.startsWith("image/")){
    showToast("이미지만 업로드 가능합니다.");
    return;
  }

  if(file.size > 5 * 1024 * 1024){
    showToast("5MB 이하만 업로드 가능합니다.");
    return;
  }
}

    let photoURL = null;

    if (fileInput.files[0]) {

      const r = ref(
        storage,
        `profiles/${currentUser.uid}_${Date.now()}`
      );

      await uploadBytes(
        r,
        fileInput.files[0]
      );

      photoURL =
        await getDownloadURL(r);
      console.log(fileInput.files[0]);
    }

    const updates = {
      displayName: newName,
      username: newUsername
    };

    if (photoURL)
      updates.photoURL = photoURL;

    await updateDoc(
  doc(db, "users", currentUser.uid),
  updates
);

    await updateProfile(
      currentUser,
      {
        displayName:newName,
        ...(photoURL && {photoURL})
      }
    );

    await loadUserProfile();

    closeModal("profile-modal");

    showToast("프로필 저장 완료");

  } catch(e) {

    console.error(e);

    showToast("프로필 저장 실패");

  } finally {

    showLoading(false);

  }

};

    // ══════════════════════════════════════════
    // FRIENDS
    // ══════════════════════════════════════════
    window.searchUser = async () => {
      const kw = document.getElementById("friend-search-input").value.trim();
      if (!kw) return;
      const el = document.getElementById("friend-search-results");
      el.innerHTML = "<p class='searching'>검색 중…</p>";
      const usersRef = collection(db, "users");
      const [su, sp] = await Promise.all([
        getDocs(query(usersRef, where("username", "==", kw))),
        getDocs(query(usersRef, where("phoneNumber", "==", kw))),
      ]);
      const results = new Map();
      [...su.docs, ...sp.docs].forEach(d => { if (d.id !== currentUser.uid) results.set(d.id, d.data()); });
      if (!results.size) { el.innerHTML = "<p class='no-result'>검색 결과가 없습니다.</p>"; return; }
      el.innerHTML = "";
      results.forEach((data, uid) => {
        el.innerHTML += `
          <div class="friend-result-item">
            <img src="${data.photoURL || `https://api.dicebear.com/7.x/thumbs/svg?seed=${uid}`}" />
            <div style="flex:1"><div style="font-weight:600">
  ${escapeHtml(data.displayName)}
</div>

<div style="font-size:12px;color:var(--text-sub)">
  @${escapeHtml(data.username)}
</div></div>
            <button onclick="addFriend('${uid}')">추가</button>
          </div>`;
      });
    };
    



    window.addFriend = async (uid) => {
        const userSnap = await getDoc(
  doc(db,"users",uid)
);

if(!userSnap.exists()){
  showToast("존재하지 않는 사용자");
  return;
}
  try {

    console.log("친구추가 대상:", uid);

    await updateDoc(
      doc(db, "users", currentUser.uid),
      {
        friends: arrayUnion(uid)
      }
    );

    console.log("추가 성공");

    showToast("친구가 추가되었습니다!");

    await loadFriendsList();

  } catch(e) {

    console.error(e);

    showToast(
      "친구추가 실패: " +
      e.message
    );

  }

};
    async function loadFriendsList() {
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      const friends = snap.data()?.friends ?? [];
      const el = document.getElementById("friends-list");
      el.innerHTML = "";
      if (!friends.length) {
        el.innerHTML = "<p class='empty-hint'>아직 친구가 없습니다.<br>친구를 추가해보세요!</p>"; return;
      }
      // 내 정보 먼저
      el.innerHTML = `<div class="section-label">나</div>
        <div class="friend-item" onclick="openModal('profile-modal')">
          <img src="${document.getElementById("header-photo").src}" />
          <div class="friend-info">
            <span class="friend-name">${document.getElementById("header-name").textContent}</span>
            <span class="friend-id">내 프로필</span>
          </div>
        </div>
        <div class="section-label">친구 ${friends.length}</div>`;
      for (const uid of friends) {
        const fs = await getDoc(doc(db, "users", uid));
        if (!fs.exists()) continue;
        const f = fs.data();
        el.innerHTML += `
          <div class="friend-item" onclick="openChat('${uid}','${f.displayName}','${f.photoURL||''}')">
            <img src="${f.photoURL || `https://api.dicebear.com/7.x/thumbs/svg?seed=${uid}`}" />
            <div class="friend-info">
              <span class="friend-name">
  ${escapeHtml(f.displayName)}
</span>

<span class="friend-id">
  @${escapeHtml(f.username)}
</span>
            </div>
          </div>`;
      }
    }

    // ══════════════════════════════════════════
    // CHAT — 1:1 채팅
    // ══════════════════════════════════════════
    window.openChat = async (friendUid, friendName, friendPhoto) => {
      const ids = [currentUser.uid, friendUid].sort();
      currentChatId = ids.join("_");
      currentChatIsGroup = false;
      const chatRef = doc(db, "chats", currentChatId);
      await runTransaction(
  db,
  async (transaction) => {

    const snap =
      await transaction.get(chatRef);

    if (!snap.exists()) {

      transaction.set(
        chatRef,
        {
          type: "direct",
          members: ids,
          createdAt: serverTimestamp()
        }
      );

    }

  }
);
      document.getElementById("chat-friend-name").textContent = friendName;
      document.getElementById("chat-friend-photo").src =
        friendPhoto || `https://api.dicebear.com/7.x/thumbs/svg?seed=${friendUid}`;
      document.getElementById("chat-member-count").textContent = "";
      showScreen("chat-screen");
      listenToMessages(currentChatId, false);
    };

    // ══════════════════════════════════════════
    // CHAT — 단체 채팅방 생성
    // ══════════════════════════════════════════
    window.createGroupChat = async () => {
      const name = document.getElementById("group-name-input").value.trim();
      const checked = [...document.querySelectorAll(".group-friend-check:checked")].map(c => c.value);
      if (!name) return showToast("채팅방 이름을 입력해주세요.");
      if (!checked.length) return showToast("친구를 1명 이상 선택해주세요.");
      const members = [currentUser.uid, ...checked];
      const chatRef = await addDoc(collection(db, "chats"), {
        type: "group", name, members,
        createdBy: currentUser.uid, createdAt: serverTimestamp(), lastMessage: "", lastAt: serverTimestamp(),
      });
      closeModal("group-modal");
      openGroupChat(chatRef.id, name, members.length);
    };

    window.openGroupChat = async (chatId, chatName, memberCount) => {
      currentChatId = chatId;
      currentChatIsGroup = true;
      document.getElementById("chat-friend-name").textContent = chatName;
      document.getElementById("chat-friend-photo").src =
        `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(chatName)}`;
      document.getElementById("chat-member-count").textContent = memberCount ? ` (${memberCount})` : "";
      showScreen("chat-screen");
      listenToMessages(chatId, true);
    };

    // ── 단체 채팅방 모달 친구 목록 ────────────
    window.openGroupModal = async () => {
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      const friends = snap.data()?.friends ?? [];
      const el = document.getElementById("group-friend-list");
      el.innerHTML = "";
      if (!friends.length) { el.innerHTML = "<p class='empty-hint'>친구가 없습니다.</p>"; }
      for (const uid of friends) {
        const fs = await getDoc(doc(db, "users", uid));
        if (!fs.exists()) continue;
        const f = fs.data();
        el.innerHTML += `
          <label class="group-friend-row">
            <img src="${f.photoURL || `https://api.dicebear.com/7.x/thumbs/svg?seed=${uid}`}" />
            <span>${escapeHtml(f.displayName)}</span>
            <input type="checkbox" class="group-friend-check" value="${uid}" />
          </label>`;
      }
      openModal("group-modal");
    };

    // ── 채팅방 목록 실시간 ────────────────────
    function listenChatList() {
      if (unsubscribeChatList) unsubscribeChatList();
      const q = query(collection(db, "chats"), where("members", "array-contains", currentUser.uid));
      unsubscribeChatList = onSnapshot(q, async (snap) => {
        const el = document.getElementById("chat-list");
        el.innerHTML = "";
        const chats = [];
        snap.forEach(d => chats.push({ id: d.id, ...d.data() }));
        chats.sort((a, b) => (b.lastAt?.seconds || 0) - (a.lastAt?.seconds || 0));
        if (!chats.length) { el.innerHTML = "<p class='empty-hint'>채팅방이 없습니다.</p>"; return; }
        for (const chat of chats) {
          let name = chat.name || "";
          let photo = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(name)}`;
          if (chat.type === "direct") {
            const friendUid = chat.members.find(m => m !== currentUser.uid);
            const fs = await getDoc(doc(db, "users", friendUid));
            if (fs.exists()) { name = fs.data().displayName; photo = fs.data().photoURL || `https://api.dicebear.com/7.x/thumbs/svg?seed=${friendUid}`; }
          }
          const time = chat.lastAt?.toDate ? formatTime(chat.lastAt.toDate()) : "";
          el.innerHTML += `
            <div class="chat-list-item" onclick="${chat.type === "group"
              ? `openGroupChat('${chat.id}','${escapeHtml(name)}',${chat.members.length})`
              : `openChat('${chat.members.find(m=>m!==currentUser.uid)}','${escapeHtml(name)}','')`}">
              <img src="${photo}" />
              <div class="chat-list-info">
                <div class="chat-list-top">
                  <span class="chat-list-name"> ${escapeHtml(name)}${chat.type==="group"?` <span class="member-badge">${chat.members.length}</span>`:""}</span>
                  <span class="chat-list-time">${time}</span>
                </div>
                <span class="chat-list-last">${escapeHtml(chat.lastMessage || "")}</span>
              </div>
            </div>`;
        }
      });
    }

    // ══════════════════════════════════════════
    // MESSAGES
    // ══════════════════════════════════════════
    function listenToMessages(chatId, isGroup) {
      if (unsubscribeChat) unsubscribeChat();
      const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"), limit(200));
      unsubscribeChat = onSnapshot(q, (snap) => {
        const container = document.getElementById("messages-container");
        container.innerHTML = "";
        snap.forEach(d => {
          const msg = d.data();
          const isMine = msg.senderId === currentUser.uid;
          const readBy = msg.readBy || [];
          // 내가 안 읽은 메시지 → readBy에 추가
          if (!isMine && !readBy.includes(currentUser.uid)) {
            updateDoc(doc(db, "chats", chatId, "messages", d.id), { readBy: arrayUnion(currentUser.uid) });
          }
          // 읽음 표시 (단체: 안 읽은 사람 수, 1:1: 읽음/안읽음)
          let readLabel = "";
          if (isMine) {
            if (isGroup) {
              const totalMembers =
window._chatMembers || 2;

const unread =
totalMembers - readBy.length;
              readLabel = unread > 0 ? `<span class="read-count">${unread}</span>` : "";
            } else {
              readLabel = readBy.length < 2 ? `<span class="read-count">1</span>` : "";
            }
          }
          container.innerHTML += `
            <div class="msg-row ${isMine ? "mine" : "theirs"}">
              ${!isMine ? `<img class="msg-avatar" src="${`https://api.dicebear.com/7.x/thumbs/svg?seed=${msg.senderId}`}" />` : ""}
              <div class="msg-col">
                ${!isMine && isGroup ? `<span class="msg-sender">${msg.senderName || ""}</span>` : ""}
                <div class="bubble-row">
                  ${isMine ? readLabel : ""}
                  <div class="bubble">
                    <p>${escapeHtml(msg.text)}</p>
                  </div>
                  ${!isMine ? "" : ""}
                </div>
                <span class="msg-time ${isMine ? "right" : "left"}">${formatTime(msg.timestamp?.toDate())}</span>
              </div>
            </div>`;
        });
        container.scrollTop = container.scrollHeight;
      });
      // 채팅방 멤버 수 저장
      getDoc(doc(db, "chats", chatId)).then(s => { window._chatMembers = s.data()?.members?.length || 2; });
    }

    window.sendMessage = async () => {
    const now = Date.now();

if(now - lastMessageTime < 1000){
  return;
}

lastMessageTime = now;
      const input = document.getElementById("message-input");
      const text = input.value.trim();
      if(text.length > 500){
  showToast("메시지는 500자 이하만 가능합니다.");
  return;
}
      if (!text || !currentChatId) return;
      input.value = "";
      input.style.height = "42px";
      const msgRef = await addDoc(collection(db, "chats", currentChatId, "messages"), {
        text: escapeHtml(text),

senderId: currentUser.uid,
        senderName: currentUser.displayName || "사용자",
        timestamp: serverTimestamp(), readBy: [currentUser.uid],
      });
      await updateDoc(doc(db, "chats", currentChatId), {
        lastMessage: text, lastAt: serverTimestamp(),
      });
    };

    window.onMessageKeyup = (e) => {
  if (e.isComposing || e.keyCode === 229) return;

  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
};

    window.backToMain = () => {
      if (unsubscribeChat) { unsubscribeChat(); unsubscribeChat = null; }
      currentChatId = null;
      showScreen("main-screen");
    };

    // ══════════════════════════════════════════
    // UI 헬퍼
    // ══════════════════════════════════════════
    window.openModal  = (id) => document.getElementById(id).classList.add("open");
    window.closeModal = (id) => document.getElementById(id).classList.remove("open");
    window.switchTab  = (tab) => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add("active");
      document.getElementById(`tab-${tab}`).classList.add("active");
    };

    function showLoading(on) { document.getElementById("loading-overlay").style.display = on ? "flex" : "none"; }
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }
    function escapeHtml(s = "") {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    function formatTime(date) {
      if (!date) return "";
      return date.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {

    #toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

    /* ═══ 로그인 화면 ═══ */

    .login-box { background:#fff;border-radius:20px;padding:24px;width:100%;max-width:360px;box-shadow:var(--shadow); }

    /* 로그인 탭 */

    /* ═══ 모달 ═══ */

    #friend-search-results { margin-top:14px; }
    .friend-result-item { display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border); }
    .friend-result-item img { width:40px;height:40px;border-radius:50%;object-fit:cover; }

    /* 단체채팅 모달 */

    /* ═══ 채팅 화면 ═══ */
    #chat-screen { background:white; }
    .chat-header { background:#fff;display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.07); }

    .mine .bubble { background:var(--kakao);color:var(--kakao-brown);border-bottom-right-radius:4px; }
    .theirs .bubble { background:#fff;color:var(--text);border-bottom-left-radius:4px; }

    .msg-time { font-size:10px;color:rgba(0,0,0,.4);margin-top:3px; }

    ::-webkit-scrollbar { width:4px; }

    #recaptcha-container { display:none; }
    .hidden { display:none !important; }
  </style>
</head>

    <div class="profile-photo-edit">
      <img id="profile-preview" src="" />
      <button class="btn-small" onclick="document.getElementById('profile-photo-input').click()">사진 변경</button>
      <input id="profile-photo-input" type="file" accept="image/*" class="hidden"
        onchange="const f=this.files[0];if(f){document.getElementById('profile-preview').src=URL.createObjectURL(f)}" />
    </div>
    <input
  id="profile-name-input"
  class="input-field"
  type="text"
  placeholder="이름"
/>

<input
  id="profile-username-input"
  class="input-field"
  type="text"
  placeholder="아이디"
/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('profile-modal')">취소</button>
      <button class="btn-save" onclick="saveProfile()">저장</button>
    </div>
  </div>
</div>

<!-- 모달: 친구 추가 -->
<div id="add-friend-modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>친구 추가</h3>
    <div class="search-row">
      <input id="friend-search-input" class="input-field" type="text" placeholder="아이디 또는 전화번호"
        onkeydown="if(event.key==='Enter')searchUser()" />
      <button class="btn-search" onclick="searchUser()">검색</button>
    </div>
    <div id="friend-search-results"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn-cancel" onclick="closeModal('add-friend-modal')">닫기</button>
    </div>
  </div>
</div>

<!-- 모달: 단체 채팅방 만들기 -->
<div id="group-modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>단체 채팅방 만들기</h3>
    <input id="group-name-input" class="input-field" type="text" placeholder="채팅방 이름" style="margin-bottom:14px;" />
    <p style="font-size:13px;color:var(--text-sub);margin-bottom:8px;">초대할 친구 선택</p>
    <div id="group-friend-list"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn-cancel" onclick="closeModal('group-modal')">취소</button>
      <button class="btn-save" onclick="createGroupChat()">만들기</button>
    </div>
  </div>
</div>

</body>
</html>
